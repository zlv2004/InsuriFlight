<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InsuriFlight — Asigurare parametrică de zbor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.4/dist/ethers.umd.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0C447C;--navy-h:#185FA5;
  --sky:#378ADD;--sky-l:#E6F1FB;--sky-b:#B5D4F4;
  --amber:#EF9F27;--amber-dk:#412402;--amber-bg:#FAEEDA;--amber-b:#FAC775;
  --green:#0F6E56;--green-l:#E1F5EE;--green-b:#9FE1CB;--green-dk:#085041;
  --red:#A32D2D;--red-l:#FCEBEB;--red-b:#F7C1C1;
  --warn-icon:#BA7517;--warn-text:#633806;
  --g50:#F1EFE8;--g100:#D3D1C7;--g400:#888780;--g500:#5F5E5A;
  --text:#1C1C1E;--muted:#6B7280;--faint:#9CA3AF;
  --bg:#EAF2FA;--white:#FFF;
  --r:10px;--rl:14px;
  --sh:0 1px 3px rgba(12,68,124,.07),0 1px 2px rgba(12,68,124,.04);
  --shm:0 4px 16px rgba(12,68,124,.13);
  --ff:'DM Sans',system-ui,sans-serif;
  --fm:'DM Mono',monospace;
}
html,body{min-height:100vh;background:var(--bg);font-family:var(--ff);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{cursor:pointer;font-family:var(--ff)}
input,textarea,select{font-family:var(--ff);font-size:14px}
a{text-decoration:none;color:inherit}

.wrap{min-height:100vh;display:flex;flex-direction:column}
.ctr{max-width:960px;margin:0 auto;padding:0 20px;width:100%}

/* ── NAV ── */
.nav{background:var(--white);border-bottom:1px solid var(--sky-b);position:sticky;top:0;z-index:50}
.nav-i{display:flex;align-items:center;gap:16px;height:58px}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo-ic{width:34px;height:34px;background:var(--navy);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-ic svg{width:18px;height:18px;stroke:white;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
.logo-nm{font-size:16px;font-weight:600;color:var(--navy);letter-spacing:-.02em}
.logo-bg{font-size:10px;font-family:var(--fm);background:var(--green-l);color:var(--green-dk);border:1px solid var(--green-b);padding:2px 8px;border-radius:5px}
.ntabs{display:flex;gap:0;flex:1;justify-content:center}
.ntab{padding:0 14px;height:58px;display:flex;align-items:center;font-size:13px;color:var(--muted);border-bottom:2px solid transparent;cursor:pointer;transition:all .15s;background:none;border-left:none;border-right:none;border-top:none;white-space:nowrap}
.ntab:hover{color:var(--navy)}
.ntab.on{color:var(--navy);border-bottom-color:var(--navy);font-weight:500}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;border:none;transition:all .15s;cursor:pointer;font-family:var(--ff);line-height:1}
.btn-p{background:var(--navy);color:var(--white)}.btn-p:hover{background:var(--navy-h)}
.btn-ok{background:var(--green);color:var(--white)}.btn-ok:hover{opacity:.87}
.btn-g{background:transparent;color:var(--muted);border:1px solid var(--g100)}.btn-g:hover{background:var(--g50);color:var(--text)}
.btn-a{background:var(--amber);color:var(--amber-dk);font-weight:600}.btn-a:hover{opacity:.87}
.btn-conn{background:var(--green-l);color:var(--green-dk);border:1px solid var(--green-b);padding:7px 14px;border-radius:8px;font-size:12px;font-weight:500;display:flex;align-items:center;gap:7px}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:7px}
.btn-w{width:100%}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* ── BANNERS ── */
.banner{padding:9px 20px;display:flex;align-items:center;justify-content:center;gap:8px}
.banner svg{flex-shrink:0}
.bw{background:var(--amber-bg);border-bottom:1px solid var(--amber-b)}
.bw span{font-size:12px;color:var(--warn-text)}
.be{background:var(--red-l);border-bottom:1px solid var(--red-b)}
.be span{font-size:12px;color:var(--red)}
.bl{color:var(--navy);font-weight:500;cursor:pointer;background:none;border:none;font-size:12px;text-decoration:underline;padding:0;font-family:var(--ff)}

/* ── HERO ── */
.hero{padding:32px 0 24px;display:flex;align-items:flex-start;justify-content:space-between;gap:24px;flex-wrap:wrap}
.hero-ey{font-size:11px;font-weight:500;color:var(--sky);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.hero-t{font-size:28px;font-weight:600;color:var(--navy);line-height:1.2;letter-spacing:-.025em;margin-bottom:8px}
.hero-s{font-size:14px;color:var(--muted);max-width:400px;line-height:1.65}
.stats{background:var(--white);border:1px solid var(--sky-b);border-radius:var(--rl);overflow:hidden;display:flex;flex-shrink:0;box-shadow:var(--sh)}
.stat{padding:14px 20px;text-align:center;border-right:1px solid var(--sky-b)}
.stat:last-child{border-right:none}
.stat-v{font-size:20px;font-weight:600;color:var(--navy);font-family:var(--fm);line-height:1.15}
.stat-l{font-size:10px;color:var(--faint);margin-top:3px;text-transform:uppercase;letter-spacing:.06em}

/* ── SECTION HDR ── */
.shd{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:16px}
.st{font-size:16px;font-weight:600;color:var(--text)}
.ss{font-size:12px;color:var(--muted);margin-top:2px}

/* ── FLIGHT CARDS ── */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:36px}
.fc{background:var(--white);border:1px solid var(--sky-b);border-radius:var(--rl);overflow:hidden;box-shadow:var(--sh);transition:box-shadow .2s,border-color .2s}
.fc:hover{box-shadow:var(--shm);border-color:#85B7EB}
.fch{padding:11px 14px;display:flex;align-items:center;justify-content:space-between}
.fch-n{background:var(--navy)}
.fch-g{background:var(--green-dk)}
.fcc{font-family:var(--fm);font-size:17px;font-weight:500;color:var(--white);letter-spacing:.07em}
.fcs{font-size:10px;padding:2px 8px;border-radius:4px;font-family:var(--fm);border:1px solid transparent}
.fcs-a{background:rgba(255,255,255,.15);color:#B5D4F4;border-color:rgba(255,255,255,.2)}
.fcs-r{background:rgba(229,248,240,.15);color:#9FE1CB;border-color:rgba(159,225,203,.3)}
.fcs-x{background:rgba(255,255,255,.1);color:rgba(255,255,255,.45);border-color:transparent}
.fcr{padding:13px 14px;border-bottom:1.5px dashed var(--sky-b);display:flex;align-items:center;gap:10px}
.ap{text-align:center;min-width:44px}
.apc{font-family:var(--fm);font-size:18px;font-weight:500;color:var(--text);line-height:1}
.apn{font-size:10px;color:var(--faint);margin-top:3px}
.rm{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px}
.rd{font-size:10px;color:var(--faint);font-family:var(--fm)}
.fff{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.fps{display:flex;gap:16px}
.pi .pl{font-size:9px;color:var(--faint);text-transform:uppercase;letter-spacing:.05em}
.pi .pv{font-family:var(--fm);font-size:13px;font-weight:500;color:var(--text);margin-top:2px}
.pi .pg{color:var(--green)}
.pl-ld{font-size:11px;color:var(--faint);font-family:var(--fm)}

/* ── POLICY CARDS ── */
.pc{background:var(--white);border:1px solid var(--sky-b);border-radius:var(--rl);padding:16px;box-shadow:var(--sh);margin-bottom:12px}
.pct{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.pcid{font-family:var(--fm);font-size:11px;color:var(--faint);margin-right:6px}
.pccod{font-size:15px;font-weight:600;color:var(--text)}
.pcrt{font-size:12px;color:var(--muted);margin-left:4px}
.badge{font-size:10px;font-weight:500;padding:3px 9px;border-radius:5px;font-family:var(--fm);border:1px solid transparent;white-space:nowrap}
.b-act{background:var(--sky-l);color:var(--navy);border-color:var(--sky-b)}
.b-eli{background:var(--amber-bg);color:var(--warn-text);border-color:var(--amber-b)}
.b-pd{background:var(--green-l);color:var(--green-dk);border-color:var(--green-b)}
.b-rf{background:var(--g50);color:var(--g500);border-color:var(--g100)}
.b-ex{background:var(--red-l);color:var(--red);border-color:var(--red-b)}
.pam{background:#F8F9FA;border-radius:8px;padding:10px 14px;display:flex;justify-content:space-between;margin-bottom:12px}
.am .al{font-size:10px;color:var(--faint);margin-bottom:3px}
.am .av{font-family:var(--fm);font-size:13px;font-weight:500;color:var(--text)}
.am .ag{color:var(--green)}
.pac{display:flex;gap:8px}
.tx-box{border-radius:8px;padding:9px 14px;font-size:12px;display:flex;align-items:center;gap:8px;margin-top:10px}
.tx-p{background:var(--sky-l);color:var(--navy);border:1px solid var(--sky-b)}
.tx-ok{background:var(--green-l);color:var(--green-dk);border:1px solid var(--green-b)}
.tx-err{background:var(--red-l);color:var(--red);border:1px solid var(--red-b)}

/* ── MODAL ── */
.mdrop{position:fixed;inset:0;background:rgba(12,68,124,.2);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.md{background:var(--white);border-radius:var(--rl);padding:24px;width:100%;max-width:400px;box-shadow:var(--shm);position:relative}
.md-x{position:absolute;top:14px;right:16px;background:none;border:none;color:var(--faint);font-size:22px;cursor:pointer;line-height:1;padding:4px}
.md-x:hover{color:var(--text)}
.md-t{font-size:18px;font-weight:600;margin-bottom:4px}
.md-s{font-size:13px;color:var(--muted);margin-bottom:18px}
.md-pill{background:var(--navy);color:var(--white);font-family:var(--fm);font-size:14px;font-weight:500;padding:11px 16px;border-radius:9px;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;letter-spacing:.04em}
.md-det{background:#F8F9FA;border-radius:9px;padding:12px 16px;margin-bottom:16px}
.md-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0}
.md-rl{font-size:12px;color:var(--muted)}
.md-rv{font-family:var(--fm);font-size:12px;font-weight:500;color:var(--text)}
.md-rv-g{color:var(--green)}
.md-div{height:1px;background:var(--sky-b);margin:8px 0}
.al-box{border-radius:8px;padding:11px 14px;display:flex;align-items:flex-start;gap:9px;margin-bottom:14px}
.al-w{background:var(--amber-bg);border:1px solid var(--amber-b)}
.al-t{font-size:12px;font-weight:500;color:var(--amber-dk);margin-bottom:2px}
.al-s{font-size:11px;color:var(--warn-text);line-height:1.5}
.al-lk{color:var(--navy);font-weight:500;cursor:pointer;background:none;border:none;font-size:11px;text-decoration:underline;padding:0;font-family:var(--ff)}
.md-tx{border-radius:8px;padding:9px 14px;margin-bottom:14px;font-size:12px;display:flex;align-items:center;gap:8px}

/* ── FORMS ── */
.fsec{max-width:560px;margin:0 auto;padding-bottom:48px}
.fcard{background:var(--white);border:1px solid var(--sky-b);border-radius:var(--rl);padding:28px;box-shadow:var(--sh)}
.f-t{font-size:18px;font-weight:600;margin-bottom:4px}
.f-s{font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.6}
.fld{margin-bottom:16px}
.fld label{display:block;font-size:11px;font-weight:500;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.fld input,.fld textarea,.fld select{width:100%;border:1px solid var(--g100);border-radius:8px;padding:9px 12px;font-size:14px;color:var(--text);background:var(--white);transition:border-color .15s;outline:none}
.fld input:focus,.fld textarea:focus{border-color:var(--sky);box-shadow:0 0 0 3px rgba(55,138,221,.11)}
.fld textarea{resize:vertical;min-height:80px;line-height:1.5}

/* ── MISC ── */
.empty{text-align:center;padding:48px 24px;color:var(--muted)}
.empty-t{font-size:15px;font-weight:500;color:var(--text);margin-bottom:6px}
.empty-s{font-size:13px;color:var(--muted);line-height:1.6}
.spin{display:inline-block;width:16px;height:16px;border:2px solid currentColor;border-right-color:transparent;border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0;vertical-align:middle}
.spin-lg{width:28px;height:28px;border-width:3px}
@keyframes sp{to{transform:rotate(360deg)}}
.pfoot{border-top:1px solid var(--sky-b);padding:20px;text-align:center;background:var(--white);margin-top:auto}
.pfoot p{font-size:11px;color:var(--faint);line-height:1.8}
.pfoot a{color:var(--sky)}
.pfoot a:hover{text-decoration:underline}
@media(max-width:640px){.fg{grid-template-columns:1fr}.hero{flex-direction:column}.ntabs{gap:0;overflow-x:auto}.ntab{padding:0 10px;font-size:12px}}
</style>
</head>
<body>
<div id="root"></div>
<script>
const { useState, useEffect, useCallback } = React;
const html = htm.bind(React.createElement);

// ─── CONFIG ──────────────────────────────────────────────────────────────────
const CONTRACT_ADDRESS  = "0x2DEe28174b1bb49E630194Fa1D7dcdCCa6323C5D";
const SEPOLIA_ID        = 11155111;
const OWNER_EMAIL       = "";  // ← completează cu emailul tău înainte de deploy

// PolicyState enum (din Solidity: ACTIVE=0, CLAIMABLE=1, PAID=2, EXPIRED=3)
const PS = { ACTIVE: 0, CLAIMABLE: 1, PAID: 2, EXPIRED: 3 };

// ⚠  Codurile de mai jos TREBUIE să coincidă EXACT cu cele înregistrate
//    prin registerFlight() pe contractul tău. Actualizează după caz.
const FLIGHTS_META = [
  { code:"RO372",  origin:"OTP", originCity:"București",   dest:"LHR", destCity:"Londra"    },
  { code:"W61234", origin:"CLJ", originCity:"Cluj-Napoca", dest:"BCN", destCity:"Barcelona" },
  { code:"TK1413", origin:"OTP", originCity:"București",   dest:"IST", destCity:"Istanbul"  },
  { code:"FR8821", origin:"TSR", originCity:"Timișoara",   dest:"CDG", destCity:"Paris"     },
];
const META_MAP = Object.fromEntries(FLIGHTS_META.map(m => [m.code, m]));

// ─── ABI (minimal — doar funcțiile utilizate în UI) ──────────────────────────
const ABI = [
  {"inputs":[{"internalType":"string","name":"flightCode","type":"string"}],"name":"purchasePolicy","outputs":[],"stateMutability":"payable","type":"function"},
  {"inputs":[{"internalType":"uint256","name":"policyId","type":"uint256"}],"name":"claimPayout","outputs":[],"stateMutability":"nonpayable","type":"function"},
  {"inputs":[{"internalType":"uint256","name":"policyId","type":"uint256"}],"name":"refundIfUnreported","outputs":[],"stateMutability":"nonpayable","type":"function"},
  {"inputs":[{"internalType":"uint256","name":"policyId","type":"uint256"}],"name":"getPolicy","outputs":[{"components":[{"internalType":"address","name":"insured","type":"address"},{"internalType":"string","name":"flightCode","type":"string"},{"internalType":"uint256","name":"purchaseTime","type":"uint256"},{"internalType":"uint256","name":"premiumPaid","type":"uint256"},{"internalType":"uint256","name":"payoutAmount","type":"uint256"},{"internalType":"uint256","name":"flightDate","type":"uint256"},{"internalType":"enum FlightInsurance.PolicyState","name":"state","type":"uint8"}],"internalType":"struct FlightInsurance.Policy","name":"","type":"tuple"}],"stateMutability":"view","type":"function"},
  {"inputs":[{"internalType":"string","name":"flightCode","type":"string"}],"name":"getFlightRoute","outputs":[{"components":[{"internalType":"string","name":"flightCode","type":"string"},{"internalType":"uint256","name":"scheduledDate","type":"uint256"},{"internalType":"uint256","name":"premiumWei","type":"uint256"},{"internalType":"uint256","name":"payoutWei","type":"uint256"},{"internalType":"bool","name":"isRegistered","type":"bool"},{"internalType":"bool","name":"resultReported","type":"bool"},{"internalType":"bool","name":"wasDelayed","type":"bool"}],"internalType":"struct FlightInsurance.FlightRoute","name":"","type":"tuple"}],"stateMutability":"view","type":"function"},
  {"inputs":[{"internalType":"uint256","name":"policyId","type":"uint256"}],"name":"isClaimWindowOpen","outputs":[{"internalType":"bool","name":"","type":"bool"}],"stateMutability":"view","type":"function"},
  {"inputs":[{"internalType":"address","name":"","type":"address"}],"name":"whitelisted","outputs":[{"internalType":"bool","name":"","type":"bool"}],"stateMutability":"view","type":"function"},
  {"inputs":[],"name":"paused","outputs":[{"internalType":"bool","name":"","type":"bool"}],"stateMutability":"view","type":"function"},
  {"inputs":[],"name":"policyCounter","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
  {"anonymous":false,"inputs":[{"indexed":true,"internalType":"uint256","name":"policyId","type":"uint256"},{"indexed":true,"internalType":"address","name":"insured","type":"address"},{"indexed":true,"internalType":"string","name":"flightCode","type":"string"},{"indexed":false,"internalType":"string","name":"flightCodePlain","type":"string"},{"indexed":false,"internalType":"uint256","name":"premiumPaid","type":"uint256"}],"name":"PolicyPurchased","type":"event"}
];

// ─── UTILS ────────────────────────────────────────────────────────────────────
const fmtAddr = a => a ? `${a.slice(0,6)}…${a.slice(-4)}` : "";
const fmtEth  = w => { const n = parseFloat(ethers.formatEther(w)); return (n % 1 === 0 ? n.toString() : n.toFixed(4).replace(/0+$/,"")) + " ETH"; };
const fmtDate = ts => ts ? new Date(Number(ts)*1000).toLocaleDateString("ro-RO",{day:"2-digit",month:"short",year:"numeric"}) : "—";

function policyBadge(state, claimOpen) {
  if (state === PS.PAID)                return { label:"Plătit",          cls:"b-pd"  };
  if (state === PS.EXPIRED)             return { label:"Expirat",         cls:"b-ex"  };
  if (state === PS.CLAIMABLE||claimOpen)return { label:"Claim disponibil",cls:"b-eli" };
  return                                       { label:"Activ",            cls:"b-act" };
}

function routeChip(r) {
  if (!r || !r.isRegistered) return { label:"—",           cls:"fcs-x" };
  if (r.resultReported)      return { label:"Raportat ✓",  cls:"fcs-r" };
  return                            { label:"Înregistrat",  cls:"fcs-a" };
}

function errMsg(e) {
  return e?.reason || e?.shortMessage || e?.data?.message || e?.message?.split("(")[0].trim() || "Eroare necunoscută";
}

// ─── ICON COMPONENTS ─────────────────────────────────────────────────────────
const IcoPlane = ({s=18}) => html`<svg width=${s} height=${s} viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.5L12 21 2 16.5M17 6.5l-5 2.5-5-2.5M12 3l10 5-10 5L2 8l10-5z"/><path d="M12 13v8"/></svg>`;
const IcoWarn  = ({s=14}) => html`<svg width=${s} height=${s} viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`;
const IcoShield= ({s=16}) => html`<svg width=${s} height=${s} viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;
const GrnDot   = () => html`<svg width="10" height="10" viewBox="0 0 10 10"><circle cx="5" cy="5" r="4" fill="#0F6E56"/><circle cx="5" cy="5" r="2.3" fill="#5DCAA5"/></svg>`;

// ─── FLIGHT CARD ──────────────────────────────────────────────────────────────
function FlightCard({ meta, route, onBuy }) {
  const chip    = routeChip(route);
  const canBuy  = route?.isRegistered && !route?.resultReported;
  const headCls = route?.resultReported ? "fch fch-g" : "fch fch-n";

  return html`
    <div class="fc">
      <div class=${headCls}>
        <span class="fcc">${meta.code}</span>
        <span class=${"fcs "+chip.cls}>${chip.label}</span>
      </div>
      <div class="fcr">
        <div class="ap">
          <div class="apc">${meta.origin}</div>
          <div class="apn">${meta.originCity}</div>
        </div>
        <div class="rm">
          <svg width="100%" height="14" viewBox="0 0 120 14" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
            <circle cx="4" cy="7" r="3.5" fill="#378ADD"/>
            <line x1="7.5" y1="7" x2="100" y2="7" stroke="#B5D4F4" stroke-width="1.2"/>
            <path d="M108 7L100 3.5V10.5L108 7Z" fill="#378ADD"/>

            <div>

              <div class="al-s">Nu poți cumpăra fără aprobare.${" "}

// ─── POLICY CARD ──────────────────────────────────────────────────────────────
function PolicyCard({ policy, claimOpen, onClaim, onRefund, txState }) {
  const meta    = META_MAP[policy.flightCode];
  const badge   = policyBadge(policy.state, claimOpen);
  const isActive= policy.state === PS.ACTIVE || policy.state === PS.CLAIMABLE;
  const canClaim= isActive && (claimOpen || policy.state === PS.CLAIMABLE);
  const txing   = txState?.type === "pending";
  const routeLbl= meta ? `${meta.origin} → ${meta.dest}` : "";

  return html`
    <div class="pc">
      <div class="pct">
        <div style="display:flex;align-items:center;flex-wrap:wrap;gap:4px">
          <span class="pcid">#${policy.id.toString()}</span>
          <span class="pccod">${policy.flightCode}</span>
          <span class="pcrt">${routeLbl}</span>
        </div>
        <span class=${"badge "+badge.cls}>${badge.label}</span>
      </div>
      <div class="pam">
        <div class="am"><div class="al">Primă plătită</div><div class="av">${fmtEth(policy.premiumPaid)}</div></div>
        <div class="am"><div class="al">Payout eligibil</div><div class="av ag">${fmtEth(policy.payoutAmount)}</div></div>
        <div class="am"><div class="al">Data zborului</div><div class="av">${fmtDate(policy.flightDate)}</div></div>
      </div>
      ${isActive && html`
        <div class="pac">
          <button class=${"btn btn-ok btn-sm"} style=${!canClaim?"opacity:.4;cursor:not-allowed":""} disabled=${!canClaim||txing} onClick=${()=>canClaim&&onClaim(policy.id)}>
            ${txState?.action==="claim"&&txing ? html`<span class="spin"></span> Se procesează…` : "Revendică despăgubire"}
          </button>
          <button class="btn btn-g btn-sm" disabled=${txing} onClick=${()=>onRefund(policy.id)}>
            ${txState?.action==="refund"&&txing ? html`<span class="spin"></span>` : "Solicită refund"}
          </button>
        </div>
      `}
      ${txState && txState.type!=="pending" && html`
        <div class=${"tx-box "+(txState.type==="ok"?"tx-ok":"tx-err")} style="margin-bottom:0">${txState.msg}</div>
      `}
    </div>
  `;
}

// ─── APP ─────────────────────────────────────────────────────────────────────
function App() {
  const [account,       setAccount]       = useState(null);
  const [chainId,       setChainId]       = useState(null);
  const [web3,          setWeb3]          = useState({ provider:null, signer:null, contract:null });
  const [isWhitelisted, setIsWhitelisted] = useState(false);
  const [isPaused,      setIsPaused]      = useState(false);
  const [routes,        setRoutes]        = useState({});
  const [policies,      setPolicies]      = useState([]);
  const [claimWindows,  setClaimWindows]  = useState({});
  const [loadingPols,   setLoadingPols]   = useState(false);
  const [tab,           setTab]           = useState("flights");
  const [modal,         setModal]         = useState(null);   // flightCode | null
  const [modalTx,       setModalTx]       = useState(null);
  const [polTx,         setPolTx]         = useState(null);   // { id, action, type, msg }

  const onSepolia = chainId === SEPOLIA_ID;

  // ── Load flight routes ────────────────────────────────────────────────────
  const loadRoutes = useCallback(async (c) => {
    if (!c) return;
    const res = {};
    await Promise.allSettled(FLIGHTS_META.map(async m => {
      try { res[m.code] = await c.getFlightRoute(m.code); }
      catch { res[m.code] = null; }
    }));
    setRoutes(res);
  }, []);

  // ── Load user policies via events ─────────────────────────────────────────
  const loadPolicies = useCallback(async (c, acc) => {
    if (!c || !acc) return;
    setLoadingPols(true);
    try {
      // Filter PolicyPurchased by insured (2nd indexed param)
      const filter = c.filters.PolicyPurchased(null, acc);
      const evts   = await c.queryFilter(filter, -50000);
      const ids    = [...new Set(evts.map(e => e.args.policyId))];
      const pols   = await Promise.all(ids.map(async id => {
        const p = await c.getPolicy(id);
        return { id, insured:p.insured, flightCode:p.flightCode, purchaseTime:p.purchaseTime,
                 premiumPaid:p.premiumPaid, payoutAmount:p.payoutAmount,
                 flightDate:p.flightDate, state:Number(p.state) };
      }));
      // Check claim windows
      const cw = {};
      await Promise.allSettled(
        pols.filter(p => p.state===PS.ACTIVE||p.state===PS.CLAIMABLE).map(async p => {
          try { cw[p.id] = await c.isClaimWindowOpen(p.id); } catch { cw[p.id]=false; }
        })
      );
      setClaimWindows(cw);
      setPolicies(pols.sort((a,b) => Number(b.id - a.id))); // newest first
    } catch(e) { console.error("loadPolicies:", e); }
    setLoadingPols(false);
  }, []);

  // ── Connect wallet ────────────────────────────────────────────────────────
  const connect = async () => {
    if (!window.ethereum) {
      alert("MetaMask nu este instalat. Instalează extensia și reîncearcă.");
      return;
    }
    try {
      const accs     = await window.ethereum.request({ method:"eth_requestAccounts" });
      const provider = new ethers.BrowserProvider(window.ethereum);
      const network  = await provider.getNetwork();
      const signer   = await provider.getSigner();
      const contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
      const cid      = Number(network.chainId);
      setAccount(accs[0]);
      setChainId(cid);
      setWeb3({ provider, signer, contract });
      if (cid === SEPOLIA_ID) {
        const [wl, paused] = await Promise.all([contract.whitelisted(accs[0]), contract.paused()]);
        setIsWhitelisted(wl);
        setIsPaused(paused);
        await loadRoutes(contract);
        await loadPolicies(contract, accs[0]);
      }
    } catch(e) { console.error("connect:", e); }
  };

  // ── Switch to Sepolia ─────────────────────────────────────────────────────
  const switchNet = async () => {
    try {
      await window.ethereum.request({ method:"wallet_switchEthereumChain", params:[{chainId:"0xaa36a7"}] });
    } catch(e) {
      if (e.code === 4902) {
        await window.ethereum.request({ method:"wallet_addEthereumChain", params:[{
          chainId:"0xaa36a7", chainName:"Sepolia Testnet",
          nativeCurrency:{name:"SepoliaETH",symbol:"ETH",decimals:18},
          rpcUrls:["https://rpc.sepolia.org"],
          blockExplorerUrls:["https://sepolia.etherscan.io"]
        }]});
      }
    }
  };

  // ── MetaMask event listeners ──────────────────────────────────────────────
  useEffect(() => {
    if (!window.ethereum) return;
    const onAccounts = a => { if(!a.length){setAccount(null);setPolicies([]);} else setAccount(a[0]); };
    const onChain    = id => setChainId(parseInt(id, 16));
    window.ethereum.on("accountsChanged", onAccounts);
    window.ethereum.on("chainChanged", onChain);
    return () => {
      window.ethereum.removeListener("accountsChanged", onAccounts);
      window.ethereum.removeListener("chainChanged", onChain);
    };
  }, []);

  // ── Read-only init (load routes before wallet connect) ────────────────────
  useEffect(() => {
    (async () => {
      try {
        const p = new ethers.JsonRpcProvider("https://rpc.sepolia.org");
        const c = new ethers.Contract(CONTRACT_ADDRESS, ABI, p);
        await loadRoutes(c);
      } catch(e) { /* fallback: routes load after wallet connect */ }
    })();
  }, [loadRoutes]);

  // ── Purchase ──────────────────────────────────────────────────────────────
  const doPurchase = async () => {
    const { contract } = web3;
    const route = routes[modal];
    if (!contract || !route) return;
    setModalTx({ type:"pending", msg:"Confirmă în MetaMask…" });
    try {
      const tx = await contract.purchasePolicy(modal, { value: route.premiumWei });
      setModalTx({ type:"pending", msg:"Tranzacție trimisă — aștept confirmarea…" });
      const receipt = await tx.wait();
      setModalTx({ type:"ok", msg:`✓ Poliță cumpărată! Tx: ${receipt.hash.slice(0,14)}…` });
      await loadPolicies(contract, account);
    } catch(e) {
      setModalTx({ type:"err", msg:`✗ ${errMsg(e)}` });
    }
  };

  // ── Claim ─────────────────────────────────────────────────────────────────
  const doClaim = async (policyId) => {
    const { contract } = web3;
    if (!contract) return;
    setPolTx({ id:policyId, action:"claim", type:"pending", msg:"Confirmă în MetaMask…" });
    try {
      const tx = await contract.claimPayout(policyId);
      setPolTx({ id:policyId, action:"claim", type:"pending", msg:"Aștept confirmarea…" });
      await tx.wait();
      setPolTx({ id:policyId, action:"claim", type:"ok", msg:"✓ Despăgubire primită!" });
      await loadPolicies(contract, account);
    } catch(e) {
      setPolTx({ id:policyId, action:"claim", type:"err", msg:`✗ ${errMsg(e)}` });
    }
  };

  // ── Refund ────────────────────────────────────────────────────────────────
  const doRefund = async (policyId) => {
    const { contract } = web3;
    if (!contract) return;
    setPolTx({ id:policyId, action:"refund", type:"pending", msg:"Confirmă în MetaMask…" });
    try {
      const tx = await contract.refundIfUnreported(policyId);
      setPolTx({ id:policyId, action:"refund", type:"pending", msg:"Aștept confirmarea…" });
      await tx.wait();
      setPolTx({ id:policyId, action:"refund", type:"ok", msg:"✓ Refund trimis!" });
      await loadPolicies(contract, account);
    } catch(e) {
      setPolTx({ id:policyId, action:"refund", type:"err", msg:`✗ ${errMsg(e)}` });
    }
  };

  return html`
    <div class="wrap">

      <!-- NAV -->
      <nav class="nav">
        <div class="ctr">
          <div class="nav-i">
            <div class="logo">
              <div class="logo-ic"><${IcoPlane} /></div>
              <span class="logo-nm">InsuriFlight</span>
              <span class="logo-bg">Sepolia</span>
            </div>
            <div class="ntabs">
              ${[["flights","Zboruri"],["policies","Polițele mele"],["access","Request acces"],["recommend","Recomandă zbor"]].map(([id,lbl]) => html`
                <button key=${id} class=${"ntab"+(tab===id?" on":"")} onClick=${()=>setTab(id)}>${lbl}</button>
              `)}
            </div>
            <div>
              ${!account
                ? html`<button class="btn btn-p" onClick=${connect}><${IcoPlane} s=${14}/> Conectează wallet</button>`
                : html`<div class="btn-conn"><${GrnDot}/> ${fmtAddr(account)}</div>`}
            </div>
          </div>
        </div>
      </nav>

      <!-- BANNERS -->
      ${account && !onSepolia && html`
        <div class="banner bw">
          <span style="color:var(--warn-icon)"><${IcoWarn}/></span>
          <span>Ești pe o rețea greșită. InsuriFlight rulează pe <strong>Sepolia Testnet</strong>.${" "}
            <button class="bl" onClick=${switchNet}>Comută →</button>
          </span>
        </div>
      `}
      ${isPaused && html`
        <div class="banner be"><${IcoWarn}/><span>Contractul este <strong>pausat</strong> — tranzacțiile sunt temporar oprite.</span></div>
      `}

      <!-- MAIN -->
      <main style="flex:1;padding-bottom:48px">
        <div class="ctr">

          <!-- FLIGHTS TAB -->
          ${tab==="flights" && html`
            <div class="hero">
              <div>
                <div class="hero-ey">Asigurare parametrică on-chain</div>
                <div class="hero-t">Protecție automată<br/>la zborul tău</div>
                <div class="hero-s">Plata despăgubirii se face automat prin smart contract pe Ethereum Sepolia, fără formulare sau cereri manuale. Întârziere ≥ 3h — payout garantat.</div>
              </div>
              <div class="stats">
                <div class="stat"><div class="stat-v">${FLIGHTS_META.length}</div><div class="stat-l">Zboruri</div></div>
                <div class="stat"><div class="stat-v">≥3h</div><div class="stat-l">Prag întârziere</div></div>
                <div class="stat"><div class="stat-v">~5×</div><div class="stat-l">Multiplicator</div></div>
              </div>
            </div>
            <div class="shd">
              <div>
                <div class="st">Zboruri disponibile</div>
                <div class="ss">${account&&onSepolia ? "Date live de pe blockchain" : "Conectează wallet-ul pentru date live și tranzacții"}</div>
              </div>
            </div>
            <div class="fg">
              ${FLIGHTS_META.map(m => html`
                <${FlightCard} key=${m.code} meta=${m} route=${routes[m.code]}
                  onBuy=${code => { if(!account){connect();return;} setModal(code);setModalTx(null); }}
                />
              `)}
            </div>
            ${!account && html`
              <div class="empty">
                <div class="empty-t">Conectează wallet-ul pentru a cumpăra</div>
                <div class="empty-s">Ai nevoie de MetaMask și de o adresă aprobată (whitelist).<br/>Dacă nu ești pe whitelist, <button class="bl" style="font-size:13px" onClick=${()=>setTab("access")}>solicită acces →</button></div>
                <button class="btn btn-p" style="margin-top:16px" onClick=${connect}>Conectează MetaMask</button>
              </div>
            `}
          `}

          <!-- POLICIES TAB -->
          ${tab==="policies" && html`
            <div style="padding-top:28px">
              <div class="shd">
                <div>
                  <div class="st">Polițele mele</div>
                  <div class="ss">${account ? `Wallet: ${fmtAddr(account)}` : "Conectează wallet-ul pentru a vedea polițele"}</div>
                </div>
                ${account&&onSepolia && html`
                  <button class="btn btn-g btn-sm" onClick=${()=>loadPolicies(web3.contract,account)}>
                    ${loadingPols ? html`<span class="spin"></span>` : "↻"} Actualizează
                  </button>
                `}
              </div>
              ${!account && html`
                <div class="empty">
                  <div class="empty-t">Conectează wallet-ul</div>
                  <div class="empty-s">Polițele tale vor apărea automat după conectare.</div>
                  <button class="btn btn-p" style="margin-top:16px" onClick=${connect}>Conectează MetaMask</button>
                </div>
              `}
              ${account&&loadingPols && html`
                <div class="empty"><span class="spin spin-lg" style="display:block;margin:0 auto"></span></div>
              `}
              ${account&&!loadingPols&&policies.length===0 && html`
                <div class="empty">
                  <div class="empty-t">Nicio poliță găsită</div>
                  <div class="empty-s">Nu ai cumpărat încă nicio poliță cu acest wallet.<br/>
                    <button class="bl" style="font-size:13px" onClick=${()=>setTab("flights")}>Mergi la Zboruri disponibile →</button>
                  </div>
                </div>
              `}
              ${policies.map(pol => html`
                <${PolicyCard} key=${pol.id.toString()} policy=${pol}
                  claimOpen=${!!claimWindows[pol.id]}
                  onClaim=${doClaim} onRefund=${doRefund}
                  txState=${polTx?.id===pol.id ? polTx : null}
                />
              `)}
            </div>
          `}

          <!-- REQUEST ACCESS TAB -->
          ${tab==="access" && html`
            <div style="padding-top:28px">
              <${RequestAccess} account=${account}/>
            </div>
          `}

          <!-- RECOMMEND TAB -->
          ${tab==="recommend" && html`
            <div style="padding-top:28px">
              <${RecommendFlight}/>
            </div>
          `}

        </div>
      </main>

      <!-- FOOTER -->
      <footer class="pfoot">
        <p>
          InsuriFlight · Smart contract Sepolia ·${" "}
          <a href=${"https://sepolia.etherscan.io/address/"+CONTRACT_ADDRESS} target="_blank" rel="noopener">${fmtAddr(CONTRACT_ADDRESS)}</a>
          ${" "}· Proiect demonstrativ · FEAA Iași 2025–2026
        </p>
      </footer>

      <!-- PURCHASE MODAL -->
      ${modal && html`
        <${PurchaseModal}
          code=${modal}
          route=${routes[modal]}
          isWhitelisted=${isWhitelisted}
          txState=${modalTx}
          onConfirm=${doPurchase}
          onClose=${() => { if(modalTx?.type!=="pending"){setModal(null);setModalTx(null);} }}
          onReqAccess=${() => { setModal(null); setTab("access"); }}
        />
      `}

    </div>
  `;
}

ReactDOM.createRoot(document.getElementById("root")).render(html`<${App}/>`);
</script>
