<!DOCTYPE html>
<html lang="ro">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InsuriFlight</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.4/dist/ethers.umd.min.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --navy: #0C447C;
      --navy-h: #185FA5;
      --sky: #378ADD;
      --sky-l: #E6F1FB;
      --sky-b: #B5D4F4;
      --amber: #EF9F27;
      --amber-dk: #412402;
      --amber-bg: #FAEEDA;
      --amber-b: #FAC775;
      --green: #0F6E56;
      --green-l: #E1F5EE;
      --green-b: #9FE1CB;
      --green-dk: #085041;
      --red: #A32D2D;
      --red-l: #FCEBEB;
      --red-b: #F7C1C1;
      --g50: #F1EFE8;
      --g100: #D3D1C7;
      --g500: #5F5E5A;
      --text: #1C1C1E;
      --muted: #6B7280;
      --faint: #9CA3AF;
      --bg: #EAF2FA;
      --white: #FFF;
      --r: 10px;
      --rl: 14px;
      --sh: 0 1px 3px rgba(12, 68, 124, .07), 0 1px 2px rgba(12, 68, 124, .04);
      --shm: 0 4px 16px rgba(12, 68, 124, .13);
      --ff: 'DM Sans', system-ui, sans-serif;
      --fm: 'DM Mono', monospace;
    }

    html,
    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: var(--ff);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased
    }

    button {
      cursor: pointer;
      font-family: var(--ff)
    }

    input,
    textarea {
      font-family: var(--ff);
      font-size: 14px
    }

    a {
      text-decoration: none;
      color: inherit
    }

    .wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column
    }

    .ctr {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 20px;
      width: 100%
    }

    .nav {
      background: var(--white);
      border-bottom: 1px solid var(--sky-b);
      position: sticky;
      top: 0;
      z-index: 50
    }

    .nav-i {
      display: flex;
      align-items: center;
      gap: 16px;
      height: 58px
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0
    }

    .logo-ic {
      width: 34px;
      height: 34px;
      background: var(--navy);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0
    }

    .logo-ic svg {
      width: 18px;
      height: 18px;
      stroke: white;
      stroke-width: 1.8;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round
    }

    .logo-nm {
      font-size: 16px;
      font-weight: 600;
      color: var(--navy);
      letter-spacing: -.02em
    }

    .logo-bg {
      font-size: 10px;
      font-family: var(--fm);
      background: var(--green-l);
      color: var(--green-dk);
      border: 1px solid var(--green-b);
      padding: 2px 8px;
      border-radius: 5px
    }

    .ntabs {
      display: flex;
      flex: 1;
      justify-content: center
    }

    .ntab {
      padding: 0 14px;
      height: 58px;
      display: flex;
      align-items: center;
      font-size: 13px;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: all .15s;
      background: none;
      border-left: none;
      border-right: none;
      border-top: none;
      white-space: nowrap
    }

    .ntab:hover {
      color: var(--navy)
    }

    .ntab.on {
      color: var(--navy);
      border-bottom-color: var(--navy);
      font-weight: 500
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      border: none;
      transition: all .15s;
      cursor: pointer;
      font-family: var(--ff);
      line-height: 1
    }

    .btn-p {
      background: var(--navy);
      color: #fff
    }

    .btn-p:hover {
      background: var(--navy-h)
    }

    .btn-ok {
      background: var(--green);
      color: #fff
    }

    .btn-ok:hover {
      opacity: .87
    }

    .btn-g {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--g100)
    }

    .btn-g:hover {
      background: var(--g50)
    }

    .btn-a {
      background: var(--amber);
      color: var(--amber-dk);
      font-weight: 600
    }

    .btn-a:hover {
      opacity: .87
    }

    .btn-conn {
      background: var(--green-l);
      color: var(--green-dk);
      border: 1px solid var(--green-b);
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 7px
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 12px;
      border-radius: 7px
    }

    .btn-w {
      width: 100%
    }

    .btn:disabled {
      opacity: .4;
      cursor: not-allowed
    }

    .banner {
      padding: 9px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px
    }

    .bw {
      background: var(--amber-bg);
      border-bottom: 1px solid var(--amber-b)
    }

    .bw span {
      font-size: 12px;
      color: #633806
    }

    .be {
      background: var(--red-l);
      border-bottom: 1px solid var(--red-b)
    }

    .be span {
      font-size: 12px;
      color: var(--red)
    }

    .bl {
      color: var(--navy);
      font-weight: 500;
      cursor: pointer;
      background: none;
      border: none;
      font-size: 12px;
      text-decoration: underline;
      padding: 0;
      font-family: var(--ff)
    }

    .hero {
      padding: 32px 0 24px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap
    }

    .hero-ey {
      font-size: 11px;
      font-weight: 500;
      color: var(--sky);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 8px
    }

    .hero-t {
      font-size: 28px;
      font-weight: 600;
      color: var(--navy);
      line-height: 1.2;
      letter-spacing: -.025em;
      margin-bottom: 8px
    }

    .hero-s {
      font-size: 14px;
      color: var(--muted);
      max-width: 400px;
      line-height: 1.65
    }

    .stats {
      background: var(--white);
      border: 1px solid var(--sky-b);
      border-radius: var(--rl);
      overflow: hidden;
      display: flex;
      flex-shrink: 0;
      box-shadow: var(--sh)
    }

    .stat {
      padding: 14px 20px;
      text-align: center;
      border-right: 1px solid var(--sky-b)
    }

    .stat:last-child {
      border-right: none
    }

    .stat-v {
      font-size: 20px;
      font-weight: 600;
      color: var(--navy);
      font-family: var(--fm)
    }

    .stat-l {
      font-size: 10px;
      color: var(--faint);
      margin-top: 3px;
      text-transform: uppercase;
      letter-spacing: .06em
    }

    .shd {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 16px
    }

    .st {
      font-size: 16px;
      font-weight: 600
    }

    .ss {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px
    }

    .fg {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 36px
    }

    .fc {
      background: var(--white);
      border: 1px solid var(--sky-b);
      border-radius: var(--rl);
      overflow: hidden;
      box-shadow: var(--sh);
      transition: box-shadow .2s, border-color .2s
    }

    .fc:hover {
      box-shadow: var(--shm);
      border-color: #85B7EB
    }

    .fch {
      padding: 11px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    .fch-n {
      background: var(--navy)
    }

    .fch-g {
      background: var(--green-dk)
    }

    .fcc {
      font-family: var(--fm);
      font-size: 17px;
      font-weight: 500;
      color: #fff;
      letter-spacing: .07em
    }

    .fcs {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      font-family: var(--fm);
      border: 1px solid transparent
    }

    .fcs-a {
      background: rgba(255, 255, 255, .15);
      color: #B5D4F4;
      border-color: rgba(255, 255, 255, .2)
    }

    .fcs-r {
      background: rgba(229, 248, 240, .15);
      color: #9FE1CB;
      border-color: rgba(159, 225, 203, .3)
    }

    .fcs-x {
      background: rgba(255, 255, 255, .1);
      color: rgba(255, 255, 255, .45)
    }

    .fcr {
      padding: 13px 14px;
      border-bottom: 1.5px dashed var(--sky-b);
      display: flex;
      align-items: center;
      gap: 10px
    }

    .ap {
      text-align: center;
      min-width: 44px
    }

    .apc {
      font-family: var(--fm);
      font-size: 18px;
      font-weight: 500;
      line-height: 1
    }

    .apn {
      font-size: 10px;
      color: var(--faint);
      margin-top: 3px
    }

    .rm {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px
    }

    .rd {
      font-size: 10px;
      color: var(--faint);
      font-family: var(--fm)
    }

    .fff {
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px
    }

    .fps {
      display: flex;
      gap: 16px
    }

    .pi .pl {
      font-size: 9px;
      color: var(--faint);
      text-transform: uppercase;
      letter-spacing: .05em
    }

    .pi .pv {
      font-family: var(--fm);
      font-size: 13px;
      font-weight: 500;
      margin-top: 2px
    }

    .pi .pg {
      color: var(--green)
    }

    .pl-ld {
      font-size: 11px;
      color: var(--faint);
      font-family: var(--fm)
    }

    .pc {
      background: var(--white);
      border: 1px solid var(--sky-b);
      border-radius: var(--rl);
      padding: 16px;
      box-shadow: var(--sh);
      margin-bottom: 12px
    }

    .pct {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px
    }

    .pct-l {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 4px
    }

    .pcid {
      font-family: var(--fm);
      font-size: 11px;
      color: var(--faint);
      margin-right: 6px
    }

    .pccod {
      font-size: 15px;
      font-weight: 600
    }

    .pcrt {
      font-size: 12px;
      color: var(--muted);
      margin-left: 4px
    }

    .badge {
      font-size: 10px;
      font-weight: 500;
      padding: 3px 9px;
      border-radius: 5px;
      font-family: var(--fm);
      border: 1px solid transparent;
      white-space: nowrap
    }

    .b-act {
      background: var(--sky-l);
      color: var(--navy);
      border-color: var(--sky-b)
    }

    .b-eli {
      background: var(--amber-bg);
      color: #633806;
      border-color: var(--amber-b)
    }

    .b-pd {
      background: var(--green-l);
      color: var(--green-dk);
      border-color: var(--green-b)
    }

    .b-ex {
      background: var(--red-l);
      color: var(--red);
      border-color: var(--red-b)
    }

    .pam {
      background: #F8F9FA;
      border-radius: 8px;
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px
    }

    .am .al {
      font-size: 10px;
      color: var(--faint);
      margin-bottom: 3px
    }

    .am .av {
      font-family: var(--fm);
      font-size: 13px;
      font-weight: 500
    }

    .am .ag {
      color: var(--green)
    }

    .pac {
      display: flex;
      gap: 8px
    }

    .tx-box {
      border-radius: 8px;
      padding: 9px 14px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px
    }

    .tx-p {
      background: var(--sky-l);
      color: var(--navy);
      border: 1px solid var(--sky-b)
    }

    .tx-ok {
      background: var(--green-l);
      color: var(--green-dk);
      border: 1px solid var(--green-b)
    }

    .tx-err {
      background: var(--red-l);
      color: var(--red);
      border: 1px solid var(--red-b)
    }

    .mdrop {
      position: fixed;
      inset: 0;
      background: rgba(12, 68, 124, .2);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px
    }

    .md {
      background: var(--white);
      border-radius: var(--rl);
      padding: 24px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shm);
      position: relative
    }

    .md-x {
      position: absolute;
      top: 14px;
      right: 16px;
      background: none;
      border: none;
      color: var(--faint);
      font-size: 22px;
      cursor: pointer;
      line-height: 1;
      padding: 4px
    }

    .md-t {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px
    }

    .md-s {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 18px
    }

    .md-pill {
      background: var(--navy);
      color: #fff;
      font-family: var(--fm);
      font-size: 14px;
      font-weight: 500;
      padding: 11px 16px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px
    }

    .md-pill-dt {
      font-size: 11px;
      opacity: .6
    }

    .md-det {
      background: #F8F9FA;
      border-radius: 9px;
      padding: 12px 16px;
      margin-bottom: 16px
    }

    .md-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0
    }

    .md-rl {
      font-size: 12px;
      color: var(--muted)
    }

    .md-rv {
      font-family: var(--fm);
      font-size: 12px;
      font-weight: 500
    }

    .md-rv-g {
      color: var(--green)
    }

    .md-rv-s {
      font-family: var(--fm);
      font-size: 11px;
      font-weight: 500;
      color: var(--muted)
    }

    .md-div {
      height: 1px;
      background: var(--sky-b);
      margin: 8px 0
    }

    .al-box {
      border-radius: 8px;
      padding: 11px 14px;
      display: flex;
      align-items: flex-start;
      gap: 9px;
      margin-bottom: 14px
    }

    .al-w {
      background: var(--amber-bg);
      border: 1px solid var(--amber-b)
    }

    .al-ico {
      flex-shrink: 0;
      margin-top: 1px;
      color: #BA7517
    }

    .al-t {
      font-size: 12px;
      font-weight: 500;
      color: var(--amber-dk);
      margin-bottom: 2px
    }

    .al-s {
      font-size: 11px;
      color: #633806;
      line-height: 1.5
    }

    .al-lk {
      color: var(--navy);
      font-weight: 500;
      cursor: pointer;
      background: none;
      border: none;
      font-size: 11px;
      text-decoration: underline;
      padding: 0;
      font-family: var(--ff)
    }

    .md-tx {
      border-radius: 8px;
      padding: 9px 14px;
      margin-bottom: 14px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .fsec {
      max-width: 560px;
      margin: 0 auto;
      padding-bottom: 48px
    }

    .fcard {
      background: var(--white);
      border: 1px solid var(--sky-b);
      border-radius: var(--rl);
      padding: 28px;
      box-shadow: var(--sh)
    }

    .f-t {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px
    }

    .f-s {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 24px;
      line-height: 1.6
    }

    .fld {
      margin-bottom: 16px
    }

    .fld label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .04em
    }

    .fld input,
    .fld textarea {
      width: 100%;
      border: 1px solid var(--g100);
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 14px;
      color: var(--text);
      background: var(--white);
      transition: border-color .15s;
      outline: none
    }

    .fld input:focus,
    .fld textarea:focus {
      border-color: var(--sky);
      box-shadow: 0 0 0 3px rgba(55, 138, 221, .11)
    }

    .fld textarea {
      resize: vertical;
      min-height: 80px;
      line-height: 1.5
    }

    .fld-m input {
      font-family: var(--fm);
      font-size: 12px
    }

    .empty {
      text-align: center;
      padding: 48px 24px;
      color: var(--muted)
    }

    .empty-t {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 6px
    }

    .empty-s {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6
    }

    .mt16 {
      margin-top: 16px
    }

    .fs13 {
      font-size: 13px
    }

    .pt28 {
      padding-top: 28px
    }

    .main-w {
      flex: 1;
      padding-bottom: 48px
    }

    .spin {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid currentColor;
      border-right-color: transparent;
      border-radius: 50%;
      animation: sp .7s linear infinite;
      flex-shrink: 0;
      vertical-align: middle
    }

    .spin-lg {
      width: 28px;
      height: 28px;
      border-width: 3px
    }

    .spin-c {
      display: block;
      margin: 0 auto
    }

    @keyframes sp {
      to {
        transform: rotate(360deg)
      }
    }

    .pfoot {
      border-top: 1px solid var(--sky-b);
      padding: 20px;
      text-align: center;
      background: var(--white);
      margin-top: auto
    }

    .pfoot p {
      font-size: 11px;
      color: var(--faint);
      line-height: 1.8
    }

    .pfoot a {
      color: var(--sky)
    }

    @media(max-width:640px) {
      .fg {
        grid-template-columns: 1fr
      }

      .hero {
        flex-direction: column
      }

      .ntabs {
        overflow-x: auto
      }

      .ntab {
        padding: 0 10px;
        font-size: 12px
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script>

    const CONTRACT_ADDRESS = "0x2DEe28174b1bb49E630194Fa1D7dcdCCa6323C5D";

    const META_MAP = Object.fromEntries(FLIGHTS_META.map(m => [m.code, m]));

    const ABI = [
      { "inputs": [{ "internalType": "string", "name": "flightCode", "type": "string" }], "name": "purchasePolicy", "outputs": [], "stateMutability": "payable", "type": "function" },
      { "inputs": [{ "internalType": "uint256", "name": "policyId", "type": "uint256" }], "name": "claimPayout", "outputs": [], "stateMutability": "nonpayable", "type": "function" },
      { "inputs": [{ "internalType": "uint256", "name": "policyId", "type": "uint256" }], "name": "refundIfUnreported", "outputs": [], "stateMutability": "nonpayable", "type": "function" },
      { "inputs": [{ "internalType": "uint256", "name": "policyId", "type": "uint256" }], "name": "getPolicy", "outputs": [{ "components": [{ "internalType": "address", "name": "insured", "type": "address" }, { "internalType": "string", "name": "flightCode", "type": "string" }, { "internalType": "uint256", "name": "purchaseTime", "type": "uint256" }, { "internalType": "uint256", "name": "premiumPaid", "type": "uint256" }, { "internalType": "uint256", "name": "payoutAmount", "type": "uint256" }, { "internalType": "uint256", "name": "flightDate", "type": "uint256" }, { "internalType": "enum FlightInsurance.PolicyState", "name": "state", "type": "uint8" }], "internalType": "struct FlightInsurance.Policy", "name": "", "type": "tuple" }], "stateMutability": "view", "type": "function" },
      { "inputs": [{ "internalType": "string", "name": "flightCode", "type": "string" }], "name": "getFlightRoute", "outputs": [{ "components": [{ "internalType": "string", "name": "flightCode", "type": "string" }, { "internalType": "uint256", "name": "scheduledDate", "type": "uint256" }, { "internalType": "uint256", "name": "premiumWei", "type": "uint256" }, { "internalType": "uint256", "name": "payoutWei", "type": "uint256" }, { "internalType": "bool", "name": "isRegistered", "type": "bool" }, { "internalType": "bool", "name": "resultReported", "type": "bool" }, { "internalType": "bool", "name": "wasDelayed", "type": "bool" }], "internalType": "struct FlightInsurance.FlightRoute", "name": "", "type": "tuple" }], "stateMutability": "view", "type": "function" },
      { "inputs": [{ "internalType": "uint256", "name": "policyId", "type": "uint256" }], "name": "isClaimWindowOpen", "outputs": [{ "internalType": "bool", "name": "", "type": "bool" }], "stateMutability": "view", "type": "function" },
      { "inputs": [{ "internalType": "address", "name": "", "type": "address" }], "name": "whitelisted", "outputs": [{ "internalType": "bool", "name": "", "type": "bool" }], "stateMutability": "view", "type": "function" },
      { "inputs": [], "name": "paused", "outputs": [{ "internalType": "bool", "name": "", "type": "bool" }], "stateMutability": "view", "type": "function" },
      { "inputs": [], "name": "policyCounter", "outputs": [{ "internalType": "uint256", "name": "", "type": "uint256" }], "stateMutability": "view", "type": "function" },
      { "anonymous": false, "inputs": [{ "indexed": true, "internalType": "uint256", "name": "policyId", "type": "uint256" }, { "indexed": true, "internalType": "address", "name": "insured", "type": "address" }, { "indexed": true, "internalType": "string", "name": "flightCode", "type": "string" }, { "indexed": false, "internalType": "string", "name": "flightCodePlain", "type": "string" }, { "indexed": false, "internalType": "uint256", "name": "premiumPaid", "type": "uint256" }], "name": "PolicyPurchased", "type": "event" }
    ];

    const fmtAddr = a => a ? a.slice(0, 6) + "..." + a.slice(-4) : "";
    const fmtEth = w => { const n = parseFloat(ethers.formatEther(w)); return (n % 1 === 0 ? n.toString() : n.toFixed(4).replace(/0+$/, "")) + " ETH"; };
    const fmtDate = ts => ts ? new Date(Number(ts) * 1000).toLocaleDateString("ro-RO", { day: "2-digit", month: "short", year: "numeric" }) : "-";

    function policyBadge(state, claimOpen) {
      if (state === PS.PAID) return { label: "Platit", cls: "b-pd" };
      if (state === PS.EXPIRED) return { label: "Expirat", cls: "b-ex" };
      if (state === PS.CLAIMABLE || claimOpen) return { label: "Claim disponibil", cls: "b-eli" };
      return { label: "Activ", cls: "b-act" };
    }
    function routeChip(r) {
      if (!r || !r.isRegistered) return { label: "-", cls: "fcs-x" };
      if (r.resultReported) return { label: "Raportat ok", cls: "fcs-r" };
      return { label: "Inregistrat", cls: "fcs-a" };
    }
    function errMsg(e) {
      return e && (e.reason || e.shortMessage || (e.data && e.data.message) || (e.message && e.message.split("(")[0].trim())) || "Eroare necunoscuta";
    }

    const IcoPlane = ({ s }) => html`<svg width=${s || 18} height=${s || 18} viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.5L12 21 2 16.5M17 6.5l-5 2.5-5-2.5M12 3l10 5-10 5L2 8l10-5z"/><path d="M12 13v8"/></svg>`;
    const IcoWarn = () => html`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`;
    const IcoShield = () => html`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;
    const GrnDot = () => html`<svg width="10" height="10" viewBox="0 0 10 10"><circle cx="5" cy="5" r="4" fill="#0F6E56"/><circle cx="5" cy="5" r="2.3" fill="#5DCAA5"/></svg>`;
    const Spin = ({ lg }) => html`<span class=${lg ? "spin spin-lg spin-c" : "spin"}></span>`;

    function FlightCard({ meta, route, onBuy }) {
      const chip = routeChip(route);
      const canBuy = !!(route && route.isRegistered && !route.resultReported);
      const hcls = route && route.resultReported ? "fch fch-g" : "fch fch-n";
      return html`
    <div class="fc">
      <div class=${hcls}>
        <span class="fcc">${meta.code}</span>
        <span class=${"fcs " + chip.cls}>${chip.label}</span>
      </div>
      <div class="fcr">
        <div class="ap"><div class="apc">${meta.origin}</div><div class="apn">${meta.originCity}</div></div>
        <div class="rm">
          <svg width="100%" height="12" viewBox="0 0 120 12" fill="none" preserveAspectRatio="none">
            <circle cx="4" cy="6" r="3" fill="#378ADD"/>
            <line x1="7" y1="6" x2="100" y2="6" stroke="#B5D4F4" stroke-width="1.5"/>
            <path d="M106 6L99 3V9L106 6Z" fill="#378ADD"/>
          </svg>
          <div class="rd">${route ? fmtDate(route.scheduledDate) : "..."}</div>
        </div>
        <div class="ap"><div class="apc">${meta.dest}</div><div class="apn">${meta.destCity}</div></div>
      </div>
      <div class="fff">
        <div class="fps">
          <div class="pi"><div class="pl">Prima</div><div class="pv">${route ? fmtEth(route.premiumWei) : html`<span class="pl-ld">...</span>`}</div></div>
          <div class="pi"><div class="pl">Payout</div><div class="pv pg">${route ? fmtEth(route.payoutWei) : html`<span class="pl-ld">...</span>`}</div></div>
        </div>
        <button class="btn btn-a btn-sm" disabled=${!canBuy} onClick=${() => canBuy && onBuy(meta.code)}>
          ${!route ? "..." : (route.resultReported ? "Expirat" : "Cumpara")}
        </button>
      </div>
    </div>
  `;
    }

    function PurchaseModal({ code, route, isWhitelisted, txState, onConfirm, onClose, onReqAccess }) {
      const meta = META_MAP[code] || {};
      const pending = txState && txState.type === "pending";
      return html`
    <div class="mdrop" onClick=${e => { if (e.target === e.currentTarget && !pending) onClose(); }}>
      <div class="md">
        <button class="md-x" onClick=${onClose} disabled=${pending}>x</button>
        <div class="md-t">Confirma polita</div>
        <div class="md-s">Verifica detaliile inainte de a semna in MetaMask</div>
        <div class="md-pill">
          <span>${code} - ${meta.origin || "?"} - ${meta.dest || "?"}</span>
          <span class="md-pill-dt">${route ? fmtDate(route.scheduledDate) : ""}</span>
        </div>
        ${route && html`
          <div class="md-det">
            <div class="md-row"><span class="md-rl">Prima de platit</span><span class="md-rv">${fmtEth(route.premiumWei)}</span></div>
            <div class="md-row"><span class="md-rl">Payout la intarziere 3h+</span><span class="md-rv md-rv-g">${fmtEth(route.payoutWei)}</span></div>
            <div class="md-div"></div>
            <div class="md-row"><span class="md-rl">Retea</span><span class="md-rv">Sepolia Testnet</span></div>
            <div class="md-row"><span class="md-rl">Contract</span><span class="md-rv-s">${fmtAddr(CONTRACT_ADDRESS)}</span></div>
          </div>
        `}
        ${!isWhitelisted && html`
          <div class="al-box al-w">
            <span class="al-ico"><${IcoShield}/></span>
            <div>
              <div class="al-t">Adresa ta nu este pe whitelist</div>
              <div class="al-s">Nu poti cumpara fara aprobare. <button class="al-lk" onClick=${onReqAccess}>Solicita acces</button></div>
            </div>
          </div>
        `}
        ${txState && html`
          <div class=${"md-tx " + (txState.type === "pending" ? "tx-p" : txState.type === "ok" ? "tx-ok" : "tx-err")}>
            ${txState.type === "pending" && html`<${Spin}/>`}
            ${txState.msg}
          </div>
        `}
        <button class="btn btn-a btn-w" disabled=${!isWhitelisted || !route || pending} onClick=${onConfirm}>
          ${pending ? html`<${Spin}/> Se proceseaza...` : ("Confirma si plateste " + (route ? fmtEth(route.premiumWei) : ""))}
        </button>
      </div>
    </div>
  `;
    }

    function PolicyCard({ policy, claimOpen, onClaim, onRefund, txState }) {
      const meta = META_MAP[policy.flightCode];
      const badge = policyBadge(policy.state, claimOpen);
      const isActive = policy.state === PS.ACTIVE || policy.state === PS.CLAIMABLE;
      const canClaim = isActive && (claimOpen || policy.state === PS.CLAIMABLE);
      const txing = txState && txState.type === "pending";
      const routeLbl = meta ? (meta.origin + " - " + meta.dest) : "";
      return html`
    <div class="pc">
      <div class="pct">
        <div class="pct-l">
          <span class="pcid">#${String(policy.id)}</span>
          <span class="pccod">${policy.flightCode}</span>
          <span class="pcrt">${routeLbl}</span>
        </div>
        <span class=${"badge " + badge.cls}>${badge.label}</span>
      </div>
      <div class="pam">
        <div class="am"><div class="al">Prima platita</div><div class="av">${fmtEth(policy.premiumPaid)}</div></div>
        <div class="am"><div class="al">Payout eligibil</div><div class="av ag">${fmtEth(policy.payoutAmount)}</div></div>
        <div class="am"><div class="al">Data zborului</div><div class="av">${fmtDate(policy.flightDate)}</div></div>
      </div>
      ${isActive && html`
        <div class="pac">
          <button class=${"btn btn-ok btn-sm" + (canClaim ? "" : " ")} disabled=${!canClaim || txing} onClick=${() => { if (canClaim) onClaim(policy.id); }}>
            ${(txState && txState.action === "claim" && txing) ? html`<${Spin}/> Se proceseaza...` : "Revendica despagubire"}
          </button>
          <button class="btn btn-g btn-sm" disabled=${txing} onClick=${() => onRefund(policy.id)}>
            ${(txState && txState.action === "refund" && txing) ? html`<${Spin}/>` : "Solicita refund"}
          </button>
        </div>
      `}
      ${(txState && txState.type !== "pending") && html`
        <div class=${"tx-box " + (txState.type === "ok" ? "tx-ok" : "tx-err")}>${txState.msg}</div>
      `}
    </div>
  `;
    }

    function RequestAccess({ account }) {
      const [f, setF] = useState({ name: "", wallet: account || "", reason: "" });
      const upd = k => e => setF(v => Object.assign({}, v, { [k]: e.target.value }));
      const send = () => {
        const s = encodeURIComponent("InsuriFlight - Cerere acces whitelist");
        const b = encodeURIComponent("Nume: " + f.name + "\nWallet: " + f.wallet + "\n\nMotiv:\n" + f.reason);
        window.location.href = "mailto:" + OWNER_EMAIL + "?subject=" + s + "&body=" + b;
      };
      return html`
    <div class="fsec"><div class="fcard">
      <div class="f-t">Solicita acces</div>
      <div class="f-s">Contractul foloseste whitelist. Completeaza formularul — va deschide clientul de email cu datele completate automat.</div>
      <div class="fld"><label>Nume / Prenume</label><input type="text" placeholder="Ion Popescu" value=${f.name} onInput=${upd("name")}/></div>
      <div class="fld fld-m"><label>Adresa wallet</label><input type="text" placeholder="0x..." value=${f.wallet} onInput=${upd("wallet")}/></div>
      <div class="fld"><label>Motiv</label><textarea placeholder="De ce doresti acces?" value=${f.reason} onInput=${upd("reason")}/></div>
      <button class="btn btn-p btn-w" onClick=${send} disabled=${!OWNER_EMAIL}>
        ${OWNER_EMAIL ? "Trimite cererea" : "OWNER_EMAIL neconfigurat in index.html"}
      </button>
    </div></div>
  `;
    }

    function RecommendFlight() {
      const [f, setF] = useState({ route: "", flightCode: "", date: "", time: "", airline: "", reason: "" });
      const upd = k => e => setF(v => Object.assign({}, v, { [k]: e.target.value }));
      const send = () => {
        const s = encodeURIComponent("InsuriFlight - Recomandare zbor");
        const b = encodeURIComponent("Ruta: " + f.route + "\nCod zbor: " + f.flightCode + "\nData: " + f.date + "\nOra preferata: " + f.time + "\nCompanie aeriana: " + f.airline + "\n\nDetalii:\n" + f.reason);
        window.location.href = "mailto:" + OWNER_EMAIL + "?subject=" + s + "&body=" + b;
      };
      return html`
    <div class="fsec"><div class="fcard">
      <div class="f-t">Recomanda un zbor</div>
      <div class="f-s">Nu gasesti ruta ta? Sugereaza-ne zborul dorit.</div>
      <div class="fld"><label>Ruta (ex: OTP - CDG)</label><input type="text" placeholder="OTP - CDG" value=${f.route} onInput=${upd("route")}/></div>
      <div class="fld"><label>Cod zbor</label><input type="text" placeholder="ex: RO 372, W6 1234 (scris pe biletul tau)" value=${f.flightCode} onInput=${upd("flightCode")} required/></div>
      <div class="fld"><label>Data dorita</label><input type="date" value=${f.date} onInput=${upd("date")}/></div>
      <div class="fld"><label>Ora preferata</label><select value=${f.time} onChange=${upd("time")}><option value="">--</option><option value="Dimineata (06:00-10:00)">Dimineata (06:00-10:00)</option><option value="Pranz (10:00-14:00)">Pranz (10:00-14:00)</option><option value="Dupa-amiaza (14:00-18:00)">Dupa-amiaza (14:00-18:00)</option><option value="Seara (18:00-23:00)">Seara (18:00-23:00)</option><option value="Orice ora">Orice ora</option></select></div>
      <div class="fld"><label>Companie aeriana (optional)</label><input type="text" placeholder="ex: TAROM, Wizz Air, Turkish Airlines" value=${f.airline} onInput=${upd("airline")}/></div>
      <div class="fld"><label>Detalii</label><textarea placeholder="Alte informatii relevante" value=${f.reason} onInput=${upd("reason")}/></div>
      <button class="btn btn-p btn-w" onClick=${send} disabled=${!OWNER_EMAIL}>
        ${OWNER_EMAIL ? "Trimite recomandarea" : "OWNER_EMAIL neconfigurat"}
      </button>
    </div></div>
  `;
    }

    function App() {
      const [account, setAccount] = useState(null);
      const accountRef = useRef(null);
      const [chainId, setChainId] = useState(null);
      const [web3, setWeb3] = useState({ provider: null, signer: null, contract: null });
      const [isWhitelisted, setIsWhitelisted] = useState(false);
      const [isPaused, setIsPaused] = useState(false);
      const [routes, setRoutes] = useState({});
      const [policies, setPolicies] = useState([]);
      const [claimWin, setClaimWin] = useState({});
      const [loadingP, setLoadingP] = useState(false);
      const [tab, setTab] = useState("flights");
      const [modal, setModal] = useState(null);
      const [modalTx, setModalTx] = useState(null);
      const [polTx, setPolTx] = useState(null);
      const onSepolia = chainId === SEPOLIA_ID;

      useEffect(() => { accountRef.current = account; }, [account]);

      const loadRoutes = useCallback(async c => {
        if (!c) return;
        const res = {};
        await Promise.allSettled(FLIGHTS_META.map(async m => {
          try { res[m.code] = await c.getFlightRoute(m.code); } catch (e) { res[m.code] = null; }
        }));
        setRoutes(res);
      }, []);

      const loadPolicies = useCallback(async (c, acc) => {
        if (!c || !acc) return;
        setLoadingP(true);
        try {
          const filter = c.filters.PolicyPurchased(null, acc);
          const evts = await c.queryFilter(filter, -200000);
          const ids = [...new Set(evts.map(e => e.args.policyId))];
          const pols = await Promise.all(ids.map(async id => {
            const p = await c.getPolicy(id);
            return {
              id, flightCode: p.flightCode, premiumPaid: p.premiumPaid,
              payoutAmount: p.payoutAmount, flightDate: p.flightDate, state: Number(p.state)
            };
          }));
          const cw = {};
          await Promise.allSettled(pols.filter(p => p.state === PS.ACTIVE || p.state === PS.CLAIMABLE).map(async p => {
            try { cw[p.id] = await c.isClaimWindowOpen(p.id); } catch (e) { cw[p.id] = false; }
          }));
          setClaimWin(cw);
          setPolicies(pols.sort((a, b) => (b.id > a.id ? -1 : b.id < a.id ? 1 : 0)));
        } catch (e) { console.error(e); }
        setLoadingP(false);
      }, []);

      const connect = async () => {
        if (!window.ethereum) { alert("MetaMask nu este instalat."); return; }
        try {
          const accs = await window.ethereum.request({ method: "eth_requestAccounts" });
          const provider = new ethers.BrowserProvider(window.ethereum);
          const network = await provider.getNetwork();
          const signer = await provider.getSigner();
          const contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
          const cid = Number(network.chainId);
          setAccount(accs[0]); setChainId(cid); setWeb3({ provider, signer, contract });
          if (cid === SEPOLIA_ID) {
            const [wl, p] = await Promise.all([contract.whitelisted(accs[0]), contract.paused()]);
            setIsWhitelisted(wl); setIsPaused(p);
            await loadRoutes(contract);
            await loadPolicies(contract, accs[0]);
          }
        } catch (e) {
          if (e.code === 4001) { /* user rejected — no action needed */ }
          else { console.error(e); alert("Eroare la conectare: " + (e.shortMessage || e.message)); }
        }
      };

      const switchNet = async () => {
        try {
          await window.ethereum.request({ method: "wallet_switchEthereumChain", params: [{ chainId: "0xaa36a7" }] });
        } catch (e) {
          if (e.code === 4902) {
            try { await window.ethereum.request({ method: "wallet_addEthereumChain", params: [{ chainId: "0xaa36a7", chainName: "Sepolia Testnet", nativeCurrency: { name: "SepoliaETH", symbol: "ETH", decimals: 18 }, rpcUrls: ["https://rpc.sepolia.org"], blockExplorerUrls: ["https://sepolia.etherscan.io"] }] }); }
            catch (addErr) { console.error("Nu s-a putut adauga Sepolia:", addErr); }
          } else if (e.code !== 4001) {
            console.error("Nu s-a putut schimba reteaua:", e);
          }
        }
      };

      useEffect(() => {
        if (!window.ethereum) return;
        const onAcc = accs => {
          if (!accs.length) { setAccount(null); setPolicies([]); setWeb3({ provider: null, signer: null, contract: null }); }
          else window.location.reload();
        };
        const onChn = () => window.location.reload();
        window.ethereum.on("accountsChanged", onAcc);
        window.ethereum.on("chainChanged", onChn);
        return () => { window.ethereum.removeListener("accountsChanged", onAcc); window.ethereum.removeListener("chainChanged", onChn); };
      }, []);

      useEffect(() => {
        (async () => {
          try { const p = new ethers.JsonRpcProvider("https://ethereum-sepolia-rpc.publicnode.com"); await loadRoutes(new ethers.Contract(CONTRACT_ADDRESS, ABI, p)); }
          catch (e) { }
        })();
      }, [loadRoutes]);

      const doPurchase = async () => {
        const { contract } = web3; const route = routes[modal]; if (!contract || !route) return;
        setModalTx({ type: "pending", msg: "Confirma in MetaMask..." });
        try {
          const tx = await contract.purchasePolicy(modal, { value: route.premiumWei });
          setModalTx({ type: "pending", msg: "Tranzactie trimisa - astept confirmarea..." });
          const r = await tx.wait();
          setModalTx({ type: "ok", msg: "Polita cumparata! Tx: " + r.hash.slice(0, 14) + "..." });
          await loadPolicies(contract, accountRef.current);
        } catch (e) { setModalTx({ type: "err", msg: "Eroare: " + errMsg(e) }); }
      };

      const doClaim = async pid => {
        const { contract } = web3; if (!contract) return;
        setPolTx({ id: pid, action: "claim", type: "pending", msg: "Confirma in MetaMask..." });
        try {
          const tx = await contract.claimPayout(pid);
          setPolTx({ id: pid, action: "claim", type: "pending", msg: "Astept confirmarea..." });
          await tx.wait();
          setPolTx({ id: pid, action: "claim", type: "ok", msg: "Despagubire primita!" });
          await loadPolicies(contract, accountRef.current);
        } catch (e) { setPolTx({ id: pid, action: "claim", type: "err", msg: "Eroare: " + errMsg(e) }); }
      };

      const doRefund = async pid => {
        const { contract } = web3; if (!contract) return;
        setPolTx({ id: pid, action: "refund", type: "pending", msg: "Confirma in MetaMask..." });
        try {
          const tx = await contract.refundIfUnreported(pid);
          setPolTx({ id: pid, action: "refund", type: "pending", msg: "Astept confirmarea..." });
          await tx.wait();
          setPolTx({ id: pid, action: "refund", type: "ok", msg: "Refund trimis!" });
          await loadPolicies(contract, accountRef.current);
        } catch (e) { setPolTx({ id: pid, action: "refund", type: "err", msg: "Eroare: " + errMsg(e) }); }
      };

      const TABS = [["flights", "Zboruri"], ["policies", "Politele mele"], ["access", "Request acces"], ["recommend", "Recomanda zbor"]];

      return html`
    <div class="wrap">
      <nav class="nav"><div class="ctr"><div class="nav-i">
        <div class="logo">
          <div class="logo-ic"><${IcoPlane}/></div>
          <span class="logo-nm">InsuriFlight</span>
          <span class="logo-bg">Sepolia</span>
        </div>
        <div class="ntabs">
          ${TABS.map(([id, lbl]) => html`<button key=${id} class=${"ntab" + (tab === id ? " on" : "")} onClick=${() => setTab(id)}>${lbl}</button>`)}
        </div>
        <div>
          ${account
          ? html`<div class="btn-conn"><${GrnDot}/> ${fmtAddr(account)}</div>`
          : html`<button class="btn btn-p" onClick=${connect}><${IcoPlane} s=${14}/> Conecteaza wallet</button>`}
        </div>
      </div></div></nav>

      ${(account && !onSepolia) && html`
        <div class="banner bw">
          <${IcoWarn}/>
          <span>Esti pe o retea gresita. InsuriFlight ruleaza pe Sepolia Testnet. <button class="bl" onClick=${switchNet}>Comuta</button></span>
        </div>
      `}
      ${isPaused && html`
        <div class="banner be"><${IcoWarn}/><span>Contractul este pausat — tranzactiile sunt oprite temporar.</span></div>
      `}

      <main class="main-w"><div class="ctr">

        ${tab === "flights" && html`
          <div class="hero">
            <div>
              <div class="hero-ey">Asigurare parametrica on-chain</div>
              <div class="hero-t">Protectie automata la zborul tau</div>
              <div class="hero-s">Plata despagubirii se face automat prin smart contract pe Ethereum Sepolia. Intarziere 3h+ = payout garantat.</div>
            </div>
            <div class="stats">
              <div class="stat"><div class="stat-v">${FLIGHTS_META.length}</div><div class="stat-l">Zboruri</div></div>
              <div class="stat"><div class="stat-v">3h+</div><div class="stat-l">Prag intarziere</div></div>
              <div class="stat"><div class="stat-v">~5x</div><div class="stat-l">Multiplicator</div></div>
            </div>
          </div>
          <div class="shd">
            <div>
              <div class="st">Zboruri disponibile</div>
              <div class="ss">${(account && onSepolia) ? "Date live de pe blockchain" : "Conecteaza wallet-ul pentru date live si tranzactii"}</div>
            </div>
          </div>
          <div class="fg">
            ${FLIGHTS_META.map(m => html`<${FlightCard} key=${m.code} meta=${m} route=${routes[m.code]} onBuy=${code => { if (!account) { connect(); return; } setModal(code); setModalTx(null); }}/>`)}
          </div>
          ${!account && html`
            <div class="empty">
              <div class="empty-t">Conecteaza wallet-ul pentru a cumpara</div>
              <div class="empty-s">Ai nevoie de MetaMask si de o adresa aprobata (whitelist).</div>
              <button class="btn btn-p mt16" onClick=${connect}>Conecteaza MetaMask</button>
            </div>
          `}
        `}

        ${tab === "policies" && html`
          <div class="pt28">
            <div class="shd">
              <div>
                <div class="st">Politele mele</div>
                <div class="ss">${account ? ("Wallet: " + fmtAddr(account)) : "Conecteaza wallet-ul"}</div>
              </div>
              ${(account && onSepolia) && html`
                <button class="btn btn-g btn-sm" onClick=${() => loadPolicies(web3.contract, account)}>
                  ${loadingP ? html`<${Spin}/>` : "Actualizeaza"}
                </button>
              `}
            </div>
            ${!account && html`<div class="empty"><div class="empty-t">Conecteaza wallet-ul</div><button class="btn btn-p mt16" onClick=${connect}>Conecteaza MetaMask</button></div>`}
            ${(account && loadingP) && html`<div class="empty"><${Spin} lg=${true}/></div>`}
            ${(account && !loadingP && policies.length === 0) && html`
              <div class="empty">
                <div class="empty-t">Nicio polita gasita</div>
                <div class="empty-s">Nu ai cumparat nicio polita cu acest wallet.</div>
                <button class="bl fs13 mt16" onClick=${() => setTab("flights")}>Mergi la Zboruri</button>
              </div>
            `}
            ${policies.map(pol => html`
              <${PolicyCard} key=${String(pol.id)} policy=${pol}
                claimOpen=${!!claimWin[pol.id]}
                onClaim=${doClaim} onRefund=${doRefund}
                txState=${(polTx && polTx.id === pol.id) ? polTx : null}
              />
            `)}
          </div>
        `}

        ${tab === "access" && html`<div class="pt28"><${RequestAccess} account=${account}/></div>`}
        ${tab === "recommend" && html`<div class="pt28"><${RecommendFlight}/></div>`}

      </div></main>

      <footer class="pfoot">
        <p>InsuriFlight - Smart contract Sepolia - <a href=${"https://sepolia.etherscan.io/address/" + CONTRACT_ADDRESS} target="_blank" rel="noopener">${fmtAddr(CONTRACT_ADDRESS)}</a> - Proiect demonstrativ FEAA Iasi 2025-2026</p>
      </footer>

      ${modal && html`
        <${PurchaseModal}
          code=${modal} route=${routes[modal]}
          isWhitelisted=${isWhitelisted} txState=${modalTx}
          onConfirm=${doPurchase}
          onClose=${() => { if (!modalTx || modalTx.type !== "pending") { setModal(null); setModalTx(null); } }}
          onReqAccess=${() => { setModal(null); setTab("access"); }}
        />
      `}
    </div>
  `;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(html`<${App}/>`);
  </script>
</body>

</html>
